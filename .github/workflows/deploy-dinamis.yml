name: Deploy Web Dinamis to AWS EC2

on:
  push:
    branches: [ main ]
    paths: 
      - 'web-dinamis/**'
      - '.github/workflows/deploy-dinamis.yml'
  
jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push Docker image
        uses: docker/build-push-action@v5.3.0
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis_2388010009:latest
      
  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy-web-dinamis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Compose file EC2 via SCP 
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          # SOLUSI: Cukup copy docker-compose.yml saja. File .sql tidak perlu di-upload berulang kali.
          source: "web-dinamis/docker-compose.yml"
          target: "/home/ubuntu/container-dinamis"

      - name: Deploy Web Dinamis via SSH and run docker compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            # Masuk ke direktori target utama tempat file docker-compose.yml berada
            cd /home/ubuntu/container-dinamis/web-dinamis
            
            # Pasang credential environment variable
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            
            # Ambil image terbaru dari Docker Hub dan jalankan ulang container
            docker compose pull
            docker compose up -d --remove-orphans